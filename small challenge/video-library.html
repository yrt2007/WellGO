<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="视频库 - 浏览所有体操舞蹈教学视频，支持搜索和筛选功能">
    <meta name="keywords" content="视频库,体操,舞蹈,教学,搜索,筛选">
    <title>视频库 - 体操舞蹈教学视频库</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

         导航栏

        <div class="navbar-container">

                </svg>
                <span>舞蹈教学</span>

                <li><a href="./LearningPage.html" class="navbar-link">首页</a></li>
                <li><a href="./video-library.html" class="navbar-link active">视频库</a></li>
                <li><a href="user-center.html" class="navbar-link">个人中心</a></li>
                <li><a href="./LearningPage.html#about" class="navbar-link">关于</a></li>
            </ul>

            <!-- 收藏数量显示 -->
            <div class="navbar-favorites">
                <a href="user-center.html" class="favorites-link" aria-label="查看收藏">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path
                            d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z">
                        </path>
                    </svg>
                    <span class="favorites-count" id="favoritesCount">0</span>
                </a>
            </div>

            <!-- 移动端菜单按钮 -->
            <button class="navbar-toggle" aria-label="切换菜单">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- ============================================
         页面标题区域
         ============================================ -->
    <header class="hero" style="padding: 2rem 0;">
        <div class="container">
            <h1 class="hero-title" style="font-size: 2rem;">视频库</h1>
            <p class="hero-description">浏览所有体操舞蹈教学视频，找到适合您的课程</p>
        </div>
    </header>

    <!-- ============================================
         搜索和筛选区域
         ============================================ -->
    <section class="search-filter-section">
        <div class="container">
            <div class="search-filter-container">
                <!-- 搜索框 -->
                <div class="search-box">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="searchInput" placeholder="搜索视频标题、描述或讲师..." aria-label="搜索视频">
                    <button class="clear-search" id="clearSearch" aria-label="清除搜索" style="display: none;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>

                <!-- 筛选器 -->
                <div class="filter-group">
                    <span class="filter-label">分类：</span>
                    <div class="checkbox-filters category-filters" id="categoryFilters">
                        <label class="checkbox-label">
                            <input type="checkbox" value="基础动作" data-category="basic">
                            <span>基础动作</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" value="舞蹈组合" data-category="dance">
                            <span>舞蹈组合</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" value="技巧训练" data-category="skills">
                            <span>技巧训练</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" value="表演展示" data-category="performance">
                            <span>表演展示</span>
                        </label>
                    </div>
                </div>

                <div class="filter-group">
                    <span class="filter-label">难度：</span>
                    <div class="checkbox-filters difficulty-filters" id="difficultyFilters">
                        <label class="checkbox-label">
                            <input type="checkbox" value="easy" data-difficulty="easy">
                            <span>入门级</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" value="medium" data-difficulty="medium">
                            <span>进阶级</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" value="hard" data-difficulty="hard">
                            <span>专业级</span>
                        </label>
                    </div>
                </div>

                <!-- 排序 -->
                <div class="filter-group">
                    <span class="filter-label">排序：</span>
                    <select class="filter-select sort-select" id="sortSelect" aria-label="排序方式">
                        <option value="newest">最新添加</option>
                        <option value="popularity">热度（观看次数）</option>
                        <option value="duration">时长</option>
                    </select>
                </div>
            </div>

            <!-- 结果计数和筛选状态 -->
            <div class="filter-status">
                <span class="results-count" id="resultsCount">共 0 个视频</span>
                <button class="clear-filters" id="clearFilters" style="display: none;">
                    清除所有筛选
                </button>
            </div>
        </div>
    </section>

    <!-- ============================================
         视频网格区域
         ============================================ -->
    <section class="section">
        <div class="container">
            <div class="videos-grid">
                <!-- 视频卡片将由 JavaScript 动态生成 -->
            </div>

            <!-- ============================================
                 分页区域
                 ============================================ -->
            <div class="pagination">
                <button class="pagination-button pagination-prev" aria-label="上一页">
                    <svg style="width: 16px; height: 16px;" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                    上一页
                </button>
                <div class="pagination-numbers">
                    <!-- 页码将由 JavaScript 动态生成 -->
                </div>
                <button class="pagination-button pagination-next" aria-label="下一页">
                    下一页
                    <svg style="width: 16px; height: 16px;" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </button>
            </div>
        </div>
    </section>

    <!-- ============================================
         页脚
         ============================================ -->

            <div class="footer-content">
                <!-- 关于 -->
                <div class="footer-section">

                    </p>
                </div>

                    <h4>快速链接</h4>
                    <nav class="footer-links">
                        <a href="./LearningPage.html">首页</a>
                        <a href="video-library.html">视频库</a>
                        <a href="./LearningPage.html#about">关于我们</a>
                        <a href="#">联系方式</a>
                    </nav>
                </div>

                <!-- 分类 -->
                <div class="footer-section">
                    <h4>热门分类</h4>
                    <nav class="footer-links">
                        <a href="video-library.html">基础动作</a>
                        <a href="video-library.html">舞蹈组合</a>
                        <a href="video-library.html">技巧训练</a>
                        <a href="video-library.html">表演展示</a>

                </div>
